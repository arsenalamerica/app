defaultSemverRangePrefix: ""

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error
  - level: discard
    pattern: "*react-textfit*"

nodeLinker: node-modules
nmMode: hardlinks-global

packageExtensions:
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true
  "@axe-core/playwright@*":
    peerDependenciesMeta:
      playwright-core:
        optional: true
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"
  "@sentry/opentelemetry@*":
    peerDependenciesMeta:
      "@opentelemetry/core":
        optional: true
      "@opentelemetry/sdk-trace-base":
        optional: true
  "@sentry/react@*":
    peerDependenciesMeta:
      react:
        optional: true
  "@sentry/webpack-plugin@*":
    peerDependenciesMeta:
      webpack:
        optional: true

yarnPath: .yarn/releases/yarn-4.13.0.cjs
