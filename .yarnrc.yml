defaultSemverRangePrefix: ""

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error
  - level: discard
    pattern: "*react-textfit*"

nodeLinker: node-modules

packageExtensions:
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true
  "@axe-core/playwright@*":
    peerDependenciesMeta:
      playwright-core:
        optional: true
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"

yarnPath: .yarn/releases/yarn-4.13.0.cjs
